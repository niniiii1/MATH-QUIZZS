    <style>

        .explanation { margin-top: 12px; font-size: 14px; color: #334155; font-style: italic; display: none; background: #f8fafc; padding: 10px 15px; border-left: 4px solid #64748b; border-radius: 4px; }

// ქვიზის გენერაცია ეკრანზე
const quizBox = document.getElementById('quiz-box');
quizData.forEach((data, qIdx) => {
    let html = `<div class="question" id="q-${qIdx}">
        <div class="question-text">${data.q}</div>
        <div class="options">`;
    
    data.opts.forEach((opt, oIdx) => {
        const isCorrect = oIdx === data.correct;
        html += `<div class="option" onclick="checkAnswer(this, ${isCorrect})">${opt}</div>`;
    });

    html += `</div><div class="explanation">${data.exp}</div></div>`;
    quizBox.innerHTML += html;
});

function checkAnswer(selectedOption, isCorrect) {
    const questionElement = selectedOption.closest('.question');
    const options = questionElement.querySelectorAll('.option');
    const explanation = questionElement.querySelector('.explanation');

    if (isCorrect) {
        selectedOption.classList.add('correct');
        options.forEach(opt => opt.classList.add('disabled'));
        if (explanation) explanation.style.display = 'block';
    } else {
        selectedOption.classList.add('wrong');
        selectedOption.style.pointerEvents = 'none';
    }
}
